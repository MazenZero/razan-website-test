<!DOCTYPE html>
<html lang="en" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ancient Identity | Discover Your Ancient Personality</title>
    <link rel="stylesheet" href="style-landing.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Cinema+Decorative:wght@400;700;900&family=Cormorant+Garamond:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-overlay"></div>
        
        <!-- Logo Section - Appears at the very top with text below -->
        <div class="logo-container">
            <div class="logo-wrapper">
                <img src="logo.png" alt="Ancient Identity Logo" class="site-logo" id="siteLogo">
            </div>
            <div class="museum-text">
                <p>Alexandria National Museum</p>
            </div>
        </div>
        
        <div class="hero-content">
            <div class="hero-tagline">DISCOVER YOUR</div>
            <h1 class="hero-title">
                ANCIENT<br>
                <span class="highlight">IDENTITY</span><br>
            </h1>
            <p class="hero-subtitle">
                A personality journey through the greatest<br>
                civilizations in history.
            </p>
            <button class="start-journey-btn" id="startJourneyBtn">
                START <span class="arrow">→</span>
            </button>
        </div>
        
        <div class="civ-wrapper">
            <div class="civ-container">
                <div class="civ-card" data-civ="egyptian">
                    <div class="civ-icon" style="color: white;">𓂀𓋹𓃠</div>
                    <h3>EGYPTIAN</h3>
                    <div class="civ-glow"></div>
                </div>
                <div class="civ-card" data-civ="greco">
                    <div class="civ-icon" style="color: white;">⚔️🏛️</div>
                    <h3>GRECO-ROMAN</h3>
                    <div class="civ-glow"></div>
                </div>
                <div class="civ-card" data-civ="islamic">
                    <div class="civ-icon" style="color: white;">☪🕌☪</div>
                    <h3>ISLAMIC GOLDEN AGE</h3>
                    <div class="civ-glow"></div>
                </div>
            </div>
        </div>
    </section>

    <script src="script-landing.js"></script>
</body>

</html>
