<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>نتيجة تحليل الشخصية الفرعونية</title>
    <link rel="stylesheet" href="result.css">
</head>

<body>
    <div class="result-page">
        <div class="result-card">
            <div class="crown-icon">⚜️</div>
            <h1>شخصيتك الفرعونية هي</h1>
            <div id="charSticker" class="character-sticker"></div>
            <div class="character-color" id="charColor"></div>
            <div class="character-name" id="charName"></div>
            <div class="character-desc" id="charDesc"></div>
            <div class="buttons-container">
                <button class="restart-btn" id="restartBtn">🔄 إعادة الاختبار</button>
                <button class="share-btn" id="shareBtn">📤 مشاركة النتيجة</button>
            </div>
        </div>
    </div>

    <script src="result.js"></script>
</body>

</html>
