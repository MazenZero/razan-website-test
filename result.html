<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Personality Result | Ancient Identity</title>
    <link rel="stylesheet" href="result.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinema+Decorative:wght@400;700;900&family=Cormorant+Garamond:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="result-page">
        
        <!-- Single Beautiful Card with Image and Text -->
        <div class="result-card">
            <!-- Decorative top border -->
            <div class="card-decoration"></div>
            
            <!-- Character Image -->
            <div class="image-wrapper">
                <img src="" alt="Character" class="character-image" id="charImage">
            </div>
            
            <!-- Crown Icon -->
            
            
            <!-- Title -->
            <h1>Your Ancient Identity Is</h1>
            
            <!-- Character Name -->
            <div class="character-name" id="charName"></div>
            
            <!-- Character Description -->
            <div class="character-desc" id="charDesc"></div>
            
            <!-- Divider -->
            <div class="divider"></div>
            
            <!-- Buttons -->
            <div class="buttons-container">
                <button class="restart-btn" id="restartBtn">🔄 Retake Test</button>
                <button class="share-btn" id="shareBtn">📤 Share Result</button>
            </div>
        </div>

    </div>

    <script src="result.js"></script>
</body>

</html>
